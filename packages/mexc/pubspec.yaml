name: mexc
description: MEXC contract (futures) API client on the shared REST/WS infrastructure
version: 0.1.0
publish_to: 'none'

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter
  core:
    path: ../core
  crypto: ^3.0.6
  dio: ^5.8.0+1
  exchange:
    path: ../exchange
  freezed_annotation: ^3.0.0
  json_annotation: ^4.12.0
  network:
    path: ../network

dev_dependencies:
  build_runner: ^2.4.15
  flutter_test:
    sdk: flutter
  freezed: ^3.0.6
  json_serializable: ^6.9.5
